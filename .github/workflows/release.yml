name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"
            ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi

            out="dist/iitj-login-${goos}-${goarch}${ext}"
            echo "building $out"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "$out" .
          done

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/iitj-login-linux-amd64
            dist/iitj-login-linux-arm64
            dist/iitj-login-darwin-amd64
            dist/iitj-login-darwin-arm64
            dist/iitj-login-windows-amd64.exe
            dist/iitj-login-windows-arm64.exe
            dist/SHA256SUMS
          generate_release_notes: true
